<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Kisaki – Calligraphy artist portfolio" />
  <title>Kisaki</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ======================================================
       Navigation
  ====================================================== -->
  <nav>
    <a href="#" class="nav-logo">K<span>i</span>saki</a>

    <ul class="nav-links">
      <li><a href="#gallery" data-i18n="nav_gallery">Gallery</a></li>
      <li><a href="#about"   data-i18n="nav_about">Profile</a></li>
      <li><a href="#contact" data-i18n="nav_contact">Contact</a></li>
    </ul>

    <!-- Language Switcher -->
    <div class="lang-switcher" role="group" aria-label="Language switcher">
      <button class="lang-btn active" data-lang="en">EN</button>
      <button class="lang-btn"        data-lang="ja">日本語</button>
    </div>
  </nav>

  <!-- ======================================================
       Hero
  ====================================================== -->
  <header class="hero">
    <!-- <div class="hero-kanji" aria-hidden="true">書</div> -->
    <h1 data-i18n="hero_title">Kisaki</h1>
    <p class="hero-subtitle" data-i18n="hero_subtitle">
      The art of the brush — where silence becomes form.
    </p>
    <a href="#gallery" class="hero-cta" data-i18n="hero_cta">View Gallery</a>
  </header>

  <!-- ======================================================
       Gallery
  ====================================================== -->
  <section id="gallery">
    <h2 class="section-title" data-i18n="gallery_title">Gallery</h2>
    <div class="section-divider"></div>

    <div class="gallery-grid" id="gallery-grid">
      <!-- Gallery items will be dynamically loaded here by script.js -->
    </div>

    <div class="gallery-actions">
      <button id="gallery-toggle-btn" class="gallery-toggle-btn" type="button" hidden></button>
    </div>
  </section>

  <!-- ======================================================
       About
  ====================================================== -->
  <section id="about" style="background: linear-gradient(180deg, var(--paper) 0%, #ad6f8c 100%); max-width: 100%; padding: 5rem 0;">
    <div style="max-width: 1100px; margin: 0 auto; padding: 0 2rem;">
      <h2 class="section-title" data-i18n="about_title">About</h2>
      <div class="section-divider"></div>
      <div class="about-inner">
        <div class="about-portrait" aria-hidden="true">🖌️</div>
        <div class="about-text">
          <p class="about-description" data-i18n="about_text"></p>
          <p class="about-signature">— 妃</p>
        </div>
      </div>
    </div>
  </section>

  <!-- ======================================================
       Contact
  ====================================================== -->
  <section id="contact">
    <h2 class="section-title" data-i18n="contact_title">Contact</h2>
    <div class="section-divider"></div>
    <div class="contact-inner">
      <div class="contact-item">
        <span class="contact-icon" aria-hidden="true">✉️</span>
        <span data-i18n="contact_email_label">Email</span>:&nbsp;
        <a href="mailto:hello@kisaki-calligraphy.art">hello@kisaki-calligraphy.art</a>
      </div>
      <div class="contact-item">
        <span class="contact-icon" aria-hidden="true">📷</span>
        <span data-i18n="contact_instagram_label">Instagram</span>:&nbsp;
        <a href="https://instagram.com/__kisaki__shoka" target="_blank" rel="noopener noreferrer">@__kisaki__shoka</a>
      </div>
    </div>
  </section>

  <!-- ======================================================
       Footer
  ====================================================== -->
  <footer>
    <div>
      <a href="https://www.instagram.com/__kisaki__shoka" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
      </a>
    </div>
    <p data-i18n="footer_copy">© 2026 Kisaki. All rights reserved.</p>
  </footer>

  <button id="gallery-next-btn" class="gallery-next-btn" type="button" aria-label="Go to About section" title="Go to About">↓</button>

  <script src="gallery.js"></script>
  <script src="script.js"></script>
</body>
</html>
